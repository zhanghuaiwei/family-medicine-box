spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: medicine-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/medicines/**
          filters:
            - StripPrefix=2
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=2
        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=2
        - id: alert-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/alert/**
          filters:
            - StripPrefix=2

server:
  port: 8080